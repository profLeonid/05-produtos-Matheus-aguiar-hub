<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./verificacao.js" defer></script>
    <script src="./main.js" defer></script>
    <title>produtos</title>
</head>

<body class="bg-gray-100 ; flex flex-col items-center justify-center flex-wrap min-h-screen ; gap-2 duration-300">

    <main 
    class="block w-full max-w-xl p-10 ; bg-white ; border border-gray-100 rounded-2xl shadow-2xl ">

<h1 
class="text-5xl text-center ; font-bold text-blue-500 ; mb-8">
    Lista de Produtos
</h1>

<div id="div_espacamento"
class="space-y-5">

<div id="div_produto"
>

<p 
class="font-semi-bold text-gray-600 ; mb-1"
>Produto
</p>

<input 
type="text" 
id="produto"
class="w-full py-3.5 rounded-2xl border border-gray-300; focus:outline-none focus:ring-2 focus:ring-gray-400 ">

</div>

<div id="div_codigo"
>

<p
class=" font-semi-bold text-gray-600 ; mb-1">
    Código
</p>

<input 
type="text" 
id="codigo"
class="w-full py-3.5 rounded-2xl border border-gray-300; focus:outline-none focus:ring-2 focus:ring-gray-400">

</div>

<div id="div_quantidade"
>

<p
class="font-semi-bold text-gray-600 ; mb-1">
    Quantidade
</p>
<input 
type="text" 
id="quantidade"
class="w-full py-3.5 rounded-2xl border border-gray-300; focus:outline-none focus:ring-2 focus:ring-gray-400">

</div>

</div>

<button 
class="bg-blue-400 text-white font-bold ; w-full mt-8 p-3.5  ; rounded-2xl"
onclick="adicionarCodigo()">
    Adicionar
</button>

<div 
id="lista"
class="">
</div>

    </main>

</body>

</html>
